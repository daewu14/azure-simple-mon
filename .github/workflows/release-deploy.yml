name: Release Deploy

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  DEFAULT_APP_URL: 'http://129.226.91.201:5762'
  DEFAULT_DEPLOY_HOST: '129.226.91.201'
  DEFAULT_DEPLOY_USER: 'ubuntu'
  DEFAULT_DEPLOY_PORT: '22'
  DEFAULT_DEPLOY_APP_DIR: '/home/ubuntu/workspace/azure-simple-mon'
  DEFAULT_DEPLOY_SERVICE_NAME: 'delivery-kpi-dashboard.service'
  DEFAULT_DEPLOY_HEALTHCHECK_URL: 'http://127.0.0.1:5762/api/test'

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ vars.APP_URL || 'http://129.226.91.201:5762' }}
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Configure deployment defaults
        shell: bash
        env:
          SECRET_DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SECRET_DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SECRET_DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          VAR_APP_URL: ${{ vars.APP_URL }}
          VAR_DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          VAR_DEPLOY_SERVICE_NAME: ${{ vars.DEPLOY_SERVICE_NAME }}
          VAR_DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
        run: |
          {
            echo "APP_URL=${VAR_APP_URL:-$DEFAULT_APP_URL}"
            echo "DEPLOY_HOST=${SECRET_DEPLOY_HOST:-$DEFAULT_DEPLOY_HOST}"
            echo "DEPLOY_USER=${SECRET_DEPLOY_USER:-$DEFAULT_DEPLOY_USER}"
            echo "DEPLOY_PORT=${SECRET_DEPLOY_PORT:-$DEFAULT_DEPLOY_PORT}"
            echo "DEPLOY_APP_DIR=${VAR_DEPLOY_APP_DIR:-$DEFAULT_DEPLOY_APP_DIR}"
            echo "DEPLOY_SERVICE_NAME=${VAR_DEPLOY_SERVICE_NAME:-$DEFAULT_DEPLOY_SERVICE_NAME}"
            echo "DEPLOY_HEALTHCHECK_URL=${VAR_DEPLOY_HEALTHCHECK_URL:-$DEFAULT_DEPLOY_HEALTHCHECK_URL}"
          } >> "$GITHUB_ENV"

      - name: Configure SSH key
        shell: bash
        run: |
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || {
            echo "Missing required secret: DEPLOY_SSH_KEY" >&2
            exit 1
          }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy selected release tag
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_REF='${{ steps.release.outputs.tag_name }}' APP_DIR='$DEPLOY_APP_DIR' SERVICE_NAME='$DEPLOY_SERVICE_NAME' HEALTHCHECK_URL='$DEPLOY_HEALTHCHECK_URL' bash -s" \
            < deployment/scripts/deploy-release.sh

      - name: Verify public app URL
        shell: bash
        run: |
          curl --fail --show-error --silent --location --retry 10 --retry-delay 3 "$APP_URL" >/dev/null
          echo "Deployed and verified: $APP_URL"
